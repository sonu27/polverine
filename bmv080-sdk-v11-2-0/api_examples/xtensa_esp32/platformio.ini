board_build.mcu = esp32c6
board = esp32-c6-devkitc-1
platform_packages =
    toolchain-riscv32-esp@14.2.0+20241119
build_unflags = -mlongcalls
build_flags =
    -DUSE_EXTERNAL_INTERRUPT
    -DBOARD_ESP32_C6
    -DHOST_INTERFACE=${setup.spi}
