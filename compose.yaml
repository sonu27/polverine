          "polverine",
          "air-quality"
        ],
        "templating": {
          "list": []
        },
        "time": {
          "from": "now-6h",
          "to": "now"
        },
        "timepicker": {},
        "timezone": "",
        "title": "Polverine",
        "uid": "polverine",
        "version": 3,
        "refresh": "10s",
        "panels": [
