services:
  mosquitto:
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    configs:
      - source: mosquitto-conf
        target: /mosquitto/config/mosquitto.conf

  timescaledb:
    image: timescale/timescaledb:2.25.2-pg18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: polverine
      POSTGRES_PASSWORD: polverine
      POSTGRES_DB: polverine
    volumes:
      - timescaledb-data:/var/lib/postgresql
    configs:
      - source: timescaledb-init
        target: /docker-entrypoint-initdb.d/init.sql

  telegraf:
    image: telegraf:latest
    restart: unless-stopped
    depends_on:
      - timescaledb
      - mosquitto
    configs:
      - source: telegraf-conf
        target: /etc/telegraf/telegraf.conf

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: polverine
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana-datasource
        target: /etc/grafana/provisioning/datasources/timescaledb.yml
      - source: grafana-dashboard-provision
        target: /etc/grafana/provisioning/dashboards/dashboards.yml
      - source: grafana-dashboard-polverine
        target: /etc/grafana/dashboards/polverine.json

configs:
  mosquitto-conf:
    content: |
      listener 1883
      allow_anonymous true
  timescaledb-init:
    content: |
      CREATE EXTENSION IF NOT EXISTS timescaledb;

      -- Tag tables (Telegraf tags_as_foreign_keys with deterministic BIGINT hashing)
      CREATE TABLE bme690_tag (tag_id BIGINT PRIMARY KEY, sensor TEXT);
      CREATE TABLE bmv080_tag (tag_id BIGINT PRIMARY KEY, sensor TEXT);

      -- bme690 data table
      CREATE TABLE bme690 (
          time TIMESTAMPTZ NOT NULL,
          tag_id BIGINT,
          temperature DOUBLE PRECISION,
          humidity DOUBLE PRECISION,
          pressure BIGINT,
          iaq BIGINT,
          iaq_accuracy BIGINT,
          static_iaq BIGINT,
          co2 BIGINT,
          voc DOUBLE PRECISION,
          gas_percentage DOUBLE PRECISION,
          tvoc BIGINT,
          tvoc_accuracy BIGINT,
          raw_temperature DOUBLE PRECISION,
          raw_humidity DOUBLE PRECISION,
          raw_gas BIGINT,
          cpu_temperature DOUBLE PRECISION,
          temp_offset DOUBLE PRECISION,
          stabilized BOOLEAN,
          run_in BOOLEAN
      );
      SELECT create_hypertable('bme690', 'time', chunk_time_interval => INTERVAL '7 days');

      -- bmv080 data table
      CREATE TABLE bmv080 (
          time TIMESTAMPTZ NOT NULL,
          tag_id BIGINT,
          runtime DOUBLE PRECISION,
          pm1 DOUBLE PRECISION,
          pm2_5 DOUBLE PRECISION,
          pm10 DOUBLE PRECISION,
          pm1_count DOUBLE PRECISION,
          pm2_5_count DOUBLE PRECISION,
          pm10_count DOUBLE PRECISION,
          obstructed BOOLEAN,
          out_of_range BOOLEAN
      );
      SELECT create_hypertable('bmv080', 'time', chunk_time_interval => INTERVAL '7 days');

      -- Compression
      ALTER TABLE bme690 SET (
          timescaledb.compress,
          timescaledb.compress_segmentby = 'tag_id',
          timescaledb.compress_orderby = 'time DESC'
      );
      ALTER TABLE bmv080 SET (
          timescaledb.compress,
          timescaledb.compress_segmentby = 'tag_id',
          timescaledb.compress_orderby = 'time DESC'
      );
      SELECT add_compression_policy('bme690', INTERVAL '1 day');
      SELECT add_compression_policy('bmv080', INTERVAL '1 day');

      -- Retention (drop chunks older than 1 year)
      SELECT add_retention_policy('bme690', INTERVAL '1 year');
      SELECT add_retention_policy('bmv080', INTERVAL '1 year');
  telegraf-conf:
    content: |
      [agent]
        interval = "1s"
        flush_interval = "10s"

      [[inputs.mqtt_consumer]]
        name_override = "bme690"
        servers = ["tcp://mosquitto:1883"]
        topics = ["polverine/+/bme690"]
        data_format = "json"
        topic_tag = ""
        [inputs.mqtt_consumer.tags]
          sensor = "bme690"

      [[inputs.mqtt_consumer]]
        name_override = "bmv080"
        servers = ["tcp://mosquitto:1883"]
        topics = ["polverine/+/bmv080"]
        data_format = "json"
        topic_tag = ""
        [inputs.mqtt_consumer.tags]
          sensor = "bmv080"

      [[outputs.postgresql]]
        connection = "postgres://polverine:polverine@timescaledb:5432/polverine?sslmode=disable"
        tags_as_foreign_keys = true
        tag_table_suffix = "_tag"
        timestamp_column_type = "timestamp with time zone"
  grafana-datasource:
    content: |
      apiVersion: 1
      datasources:
        - name: TimescaleDB
          type: postgres
          access: proxy
          url: timescaledb:5432
          database: polverine
          user: polverine
          secureJsonData:
            password: polverine
          jsonData:
            database: polverine
            sslmode: disable
            postgresVersion: 1800
            timescaledb: true
          isDefault: true
  grafana-dashboard-provision:
    content: |
      apiVersion: 1
      providers:
        - name: Polverine
          orgId: 1
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /etc/grafana/dashboards
